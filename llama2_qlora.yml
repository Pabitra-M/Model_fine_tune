# ===========================================================================
#  Axolotl Fine-Tuning Config — Llama-2-7B QLoRA
#  Dataset: output_qa_clean.json  (URLs removed from answers)
#  Usage:   accelerate launch -m axolotl.cli.train config.yml
# ===========================================================================

# ---------------------------------------------------------------------------
# Base model
# ---------------------------------------------------------------------------
base_model: NousResearch/Llama-2-7b-chat-hf
base_model_config: NousResearch/Llama-2-7b-chat-hf
model_type: LlamaForCausalLM
tokenizer_type: LlamaTokenizer
trust_remote_code: true
tokenizer_use_fast: false          # Llama-2 works best with slow tokenizer

# ---------------------------------------------------------------------------
# Dataset  ← now pointing to the cleaned file
# ---------------------------------------------------------------------------
datasets:
  - path: output_qa.json
    type: alpaca
    data_files:
      - output_qa.json
    field_instruction: question    # your JSON key for the question
    field_output: answer           # your JSON key for the answer

dataset_prepared_path: ./prepared_data
val_set_size: 0.05                 # 5% held out for evaluation
seed: 42

# ---------------------------------------------------------------------------
# Prompt / chat template
# ---------------------------------------------------------------------------
chat_template: llama2
system_prompt: |
  You are a helpful assistant.

  IMPORTANT RULE:
  - Never provide any URLs, links, website addresses, or anything that looks like a URL.
  - Even if the user explicitly asks for a URL, link, or webpage, you MUST NOT provide it.

  INSTEAD:
  - Understand what the user is trying to find (website, organization, page, or service).
  - Provide a clear, detailed explanation about that topic.
  - Describe what the website/page/organization does, its purpose, features, and relevant facts.
  - Your answer MUST be at least 100 words.
  - Write in simple, clear English.

  STYLE:
  - No URLs at all.
  - No bullet links or references.
  - Only plain text explanation.
  - Be informative, factual, and easy to understand.

  Your goal is to replace links with useful knowledge.

# ---------------------------------------------------------------------------
# Sequence length
# ---------------------------------------------------------------------------
sequence_len: 1024                 # enough for system prompt + Q + A
sample_packing: false              # false is safer for QA pairs

# ---------------------------------------------------------------------------
# 4-bit QLoRA quantization
# ---------------------------------------------------------------------------
load_in_4bit: true
adapter: qlora

bnb_config_kwargs:
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: float16
  bnb_4bit_use_double_quant: true

# ---------------------------------------------------------------------------
# LoRA adapter
# ---------------------------------------------------------------------------
lora_r: 32
lora_alpha: 64                     # rule of thumb: alpha = 2 * r
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_fan_in_fan_out: false
lora_modules_to_save: ~

# ---------------------------------------------------------------------------
# Training hyperparameters
# ---------------------------------------------------------------------------
output_dir: ./llama2_qlora-output

num_epochs: 7
micro_batch_size: 2
gradient_accumulation_steps: 8    # effective batch size = 2 * 8 = 16
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 1e-4
warmup_ratio: 0.05

bf16: true                         # use fp16: true if your GPU has no bf16
tf32: false

max_grad_norm: 1.0
weight_decay: 0.01

# ---------------------------------------------------------------------------
# Logging / saving
# ---------------------------------------------------------------------------
logging_steps: 10
eval_steps: 0.1                    # evaluate every 10% of an epoch
save_steps: 0.1
save_total_limit: 3
load_best_model_at_end: true

wandb_project: ~
wandb_run_id: ~
use_tensorboard: false

# ---------------------------------------------------------------------------
# Hardware
# ---------------------------------------------------------------------------
gradient_checkpointing: true
flash_attention: false             # set true if flash-attn is installed
deepspeed: ~                       # path to deepspeed config for multi-GPU

# ---------------------------------------------------------------------------
# Inference / generation defaults
# ---------------------------------------------------------------------------
inference:
  max_new_tokens: 300
  do_sample: true
  temperature: 0.7
  top_p: 0.9
  repetition_penalty: 1.15